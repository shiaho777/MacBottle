# Delivery gate:
# - Branch protection should require this workflow's jobs on PRs into main when paths match.
# - Issues close via PR body Fixes #N / Closes #N on *merge*, not from this workflow.
# - Do not merge while this workflow is red; do not close the linked Issue early.
# - Path filters: markdown/docs-only changes may skip this workflow.

name: Build

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

on:
  pull_request:
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - '.github/ISSUE_TEMPLATE/**'
      - 'WhiskyKit/Sources/WhiskyKit/Recipes/_index.json'
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - '.github/ISSUE_TEMPLATE/**'
      - 'WhiskyKit/Sources/WhiskyKit/Recipes/_index.json'
  workflow_dispatch:

jobs:
  build:
    name: xcodebuild Debug
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app || true

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Build app (unsigned)
        run: |
          xcodebuild \
            -project Whisky.xcodeproj \
            -scheme Whisky \
            -configuration Debug \
            -destination 'platform=macOS' \
            -skipPackagePluginValidation \
            -skipMacroValidation \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Delivery policy summary
        if: always()
        run: |
          {
            echo "### Delivery gate"
            echo "- CI gates merge; it does **not** close Issues."
            echo "- Linked Issues close only when a PR with \`Fixes #N\` / \`Closes #N\` is **merged**."
            echo "- Do not merge while required checks are red."
          } >> "$GITHUB_STEP_SUMMARY"

  test:
    name: WhiskyKit tests
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app || true

      - name: Run unit tests
        working-directory: WhiskyKit
        run: swift test

      - name: Delivery policy summary
        if: always()
        run: |
          {
            echo "### Delivery gate"
            echo "- CI gates merge; it does **not** close Issues."
            echo "- Linked Issues close only when a PR with \`Fixes #N\` / \`Closes #N\` is **merged**."
            echo "- Do not merge while required checks are red."
          } >> "$GITHUB_STEP_SUMMARY"
