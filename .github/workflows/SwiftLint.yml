# Delivery gate:
# - Branch protection should require this job on PRs that change Swift sources.
# - Issues close via PR body Fixes #N / Closes #N on *merge*, not from this workflow.
# - Do not merge while this workflow is red; do not close the linked Issue early.

name: SwiftLint

concurrency:
  group: swiftlint-${{ github.ref }}
  cancel-in-progress: true

on:
  pull_request:
    paths:
      - '**/*.swift'
      - '.swiftlint.yml'
      - '.github/workflows/SwiftLint.yml'
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  SwiftLint:
    # Run on macOS so the lint environment matches the one developers see
    # locally when they build in Xcode.
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Delivery policy summary
        if: always()
        run: |
          {
            echo "### Delivery gate"
            echo "- CI gates merge; it does **not** close Issues."
            echo "- Linked Issues close only when a PR with \`Fixes #N\` / \`Closes #N\` is **merged**."
            echo "- Do not merge while required checks are red."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Run SwiftLint (strict)
        run: swiftlint lint --strict --reporter github-actions-logging
